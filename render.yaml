databases:
  - name: workforce-safety-db
    plan: free

services:
  # Backend Web Service
  - type: web
    name: workforce-safety-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    plan: free
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DB_HOST
        fromDatabase:
          name: workforce-safety-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: workforce-safety-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: workforce-safety-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: workforce-safety-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: workforce-safety-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 5000

  # Frontend Web Service
  - type: web
    name: workforce-safety-frontend
    env: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    plan: free
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: workforce-safety-backend
          envVarKey: RENDER_EXTERNAL_URL
      - key: NEXT_PUBLIC_WS_URL
        fromService:
          type: web
          name: workforce-safety-backend
          envVarKey: RENDER_EXTERNAL_URL
